[build]
  command = "node scripts/generate-sitemap.js"
  publish = "."

[[redirects]]
  from = "/Blog/*"
  to = "/blog/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*.html"
  to = "/blog/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# pretty_urls DISABLED — it prevented .html → clean URL 301 redirects
# from firing (pretty_urls serves files at both /foo and /foo.html,
# so the redirect rules above never matched). Netlify still serves
# foo.html at /foo by default without pretty_urls enabled.
